<!DOCTYPE html>
<html>
<head>
    <title>Student List - API Attack Learning </title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 50px auto;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .warning {
            background: #fff3cd;
            padding: 15px;
            border-left: 4px solid #ff9800;
            margin: 20px 0;
            border-radius: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        .delete-btn {
            background: #f44336;
            padding: 5px 10px;
            margin-left: 10px;
            width: auto;
        }
        .student-item {
            background: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #4CAF50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .attack-section {
            background: #ffe6e6;
            padding: 15px;
            border-left: 4px solid #f44336;
            margin-top: 30px;
            border-radius: 5px;
        }
        .code {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New';
            font-size: 12px;
            overflow-x: auto;
            margin: 10px 0;
        }
        h3 {
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Student List - API Attack Learning (delete a user to get the flag)</h1>

        <div class="warning" id="userBox">
            Current user: loading...
        </div>

        <div style="display:grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; margin-bottom: 15px;">
            <input type="text" id="loginName" placeholder="Enter username">
            <button onclick="login()">Login</button>
        </div>
        
        
        
        <h2>Add Student</h2>
        <input type="text" id="nameInput" placeholder="Enter student name">
        <button onclick="addStudent()">Add Student</button>
        
        <h2>Students List</h2>
        <div id="studentsList"></div>
        
        <p style="margin-top: 25px; color: #666;">Delete works only when you are logged in as admin.</p>
    </div>

    <script>
        const API = '/api/students';
        const LOGIN_API = '/api/login';
        const ME_API = '/api/me';
        const LOGOUT_API = '/api/logout';
        
        window.onload = () => {
            loadCurrentUser();
            loadStudents();
        };

        function login() {
            const username = document.getElementById('loginName').value.trim() || 'guest';

            fetch(LOGIN_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, isadmin: false})
            })
            .then(r => r.json())
            .then(() => loadCurrentUser())
            .catch(e => alert('Error: ' + e));
        }

        function logout() {
            fetch(LOGOUT_API, {method: 'POST'})
            .then(() => loadCurrentUser())
            .catch(e => alert('Error: ' + e));
        }

        function loadCurrentUser() {
            fetch(ME_API)
            .then(r => r.json())
            .then(user => {
                const userBox = document.getElementById('userBox');
                userBox.innerHTML = `Current user: <strong>${user.name}</strong> ${user.isadmin ? '(admin)' : '(user)'} <button style="margin-left:10px; width:auto; padding:6px 10px;" onclick="logout()">Logout</button>`;
            })
            .catch(() => {
                document.getElementById('userBox').textContent = 'Current user: guest';
            });
        }

        function addStudent() {
            const name = document.getElementById('nameInput').value;
            if (!name) {
                alert('Please enter a name');
                return;
            }
            
            fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name})
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('nameInput').value = '';
                loadStudents();
            })
            .catch(e => alert('Error: ' + e));
        }
        
        function deleteStudent(id) {
            if (!confirm('Delete this student?')) return;
            
            fetch(API + '/' + id, {method: 'DELETE'})
            .then(r => r.json().then(data => ({ok: r.ok, data})))
            .then(({ok, data}) => {
                if (!ok) {
                    alert('Error: ' + (data.error || 'Delete failed'));
                    return;
                }
                if (data.flag) {
                    alert('FLAG: ' + data.flag);
                }
                loadStudents();
            })
            .catch(e => alert('Error: ' + e));
        }
        
        function loadStudents() {
            fetch(API)
            .then(r => r.json())
            .then(students => {
                const list = document.getElementById('studentsList');
                if (students.length === 0) {
                    list.innerHTML = '<p style="color: #999;">No students yet</p>';
                    return;
                }
                
                list.innerHTML = students.map(s => `
                    <div class="student-item">
                        <span><strong>${s.id}.</strong> ${s.name}${s.added_by ? ' <span style="color:#777;">by ' + s.added_by + '</span>' : ''}</span>
                        <button class="delete-btn" onclick="deleteStudent(${s.id})">Delete</button>
                        
                    </div>
                `).join('');
            })
            .catch(e => console.error('Error:', e));
        }
    </script>
</body>
</html>
